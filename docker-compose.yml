services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_LOGS_REGION:-us-west-2}
        awslogs-group: /figma-to-code/caddy
        awslogs-create-group: "true"

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVER_OUTPUT_DIR=/app/web_output
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME:-}
      - DYNAMODB_REGION=${DYNAMODB_REGION:-us-west-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - web_output:/app/web_output
      - ./logs:/app/logs
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_LOGS_REGION:-us-west-2}
        awslogs-group: /figma-to-code/app
        awslogs-create-group: "true"

volumes:
  web_output:
  caddy_data:
  caddy_config:
